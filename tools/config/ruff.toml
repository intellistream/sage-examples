# sage-examples 统一代码质量配置
# 所有子包应该继承这个配置
# 使用方法：在子包的 pyproject.toml 中添加：
#   [tool.ruff]
#   extend = "../../tools/config/ruff.toml"
#
# 注意：ruff.toml 文件不使用 [tool.xxx] 前缀
#      只有 pyproject.toml 才需要 [tool.xxx] 前缀

# ============================================================================
# Ruff Configuration (替代 flake8, isort, pyupgrade 等)
# ============================================================================
target-version = "py310"  # sage-examples supports Python 3.10+
line-length = 100

# 排除特定目录
extend-exclude = [
    "build",
    "_deps",
    ".venv",
    "venv",
    ".sage",
    "*.egg-info",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "dist",
]

[lint]
# 启用的规则集
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "C90",  # mccabe complexity
]

# 全局忽略的错误
ignore = [
    "E501",   # line too long (handled by ruff formatter)
    "B904",   # raise-without-from-inside-except
    "C901",   # complex-structure (too-complex function)
    "E402",   # module-import-not-at-top-of-file
    "B026",   # star-arg-unpacking-after-keyword-arg
    "B007",   # unused-loop-control-variable
    "B023",   # function-uses-loop-variable
    "B025",   # duplicate-try-block-exception
    "B018",   # useless-expression
    "F402",   # import-shadowed-by-loop-var
    "F405",   # undefined-local-with-import-star
    "UP035",  # deprecated-import (typing.List, etc.)
    "UP007",  # non-pep604-annotation
    "UP009",  # utf-8-encoding-declaration (keep for compatibility)
]

# 每个文件的具体忽略规则
[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]  # Unused imports in __init__.py are OK
"**/tests/**" = ["B018"]  # Allow expressions in tests
"**/test_*.py" = ["B018"]
"**/*_test.py" = ["B018"]

[lint.isort]
# Import 排序配置
known-first-party = ["sage"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

[lint.mccabe]
# 圈复杂度限制
max-complexity = 15

[format]
# 格式化配置
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
